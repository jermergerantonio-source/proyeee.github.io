<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesion - Calculadora de Agua</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="../css/css.css">
</head>
<body>

<div class="container login-container">
  <h1>Calculadora de Agua</h1>
  <!-- login -->
  
  <form id="loginForm" class="login-form">
    <!-- formulario login -->
    <h2>Iniciar Sesion</h2>
    
    <div class="form-group">
      <label for="username" aria-required="true">Nombre de usuario:</label>
      <input type="text" id="username" name="username" required placeholder="Ingresa tu nombre" aria-label="Ingresar nombre de usuario" aria-describedby="username-help">
    </div>

    <div class="form-group">
      <label for="password" aria-required="true">Contraseña:</label>
      <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña" aria-label="Ingresar contraseña" aria-describedby="password-help">
    </div>

    <div id="mensaje" class="mensaje"></div>

    <button type="submit" class="btn-login" aria-label="Iniciar sesion en la aplicacion">Iniciar Sesion</button>
  </form>

  <div class="info-login">
    <!-- seccion login -->
    <p><strong>Nota:</strong> Los datos se guardarán en tu dispositivo de forma segura :D</p>
  </div>
</div>

<script src="../js/login.js"></script>
<script src="../js/utilities.js"></script>
<script src="../js/theme.js"></script>

</body>
</html>
